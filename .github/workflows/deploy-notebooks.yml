name: Deploy Notebooks to GitHub Pages

# Runs AFTER the clean workflow finishes — avoids the race condition where
# nbconvert would see dirty notebooks and crash on widget metadata.
on:
  workflow_run:
    workflows: ["Clean Notebooks for GitHub Rendering"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # For workflow_run events, only proceed if the upstream job succeeded.
    # workflow_dispatch always proceeds.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout (latest commit after clean)
        uses: actions/checkout@v4
        with:
          ref: main   # always grab the post-clean commit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install jupyter nbconvert nbformat
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Safety net: re-run the same cleaning logic in case this job was
      # triggered via workflow_dispatch on a repo that hasn't been cleaned yet.
      - name: Strip widget metadata (safety net)
        run: |
          python - <<'EOF'
          import nbformat, glob
          WIDGET_VIEW_MIME  = "application/vnd.jupyter.widget-view+json"
          WIDGET_STATE_MIME = "application/vnd.jupyter.widget-state+json"
          for path in glob.glob("**/*.ipynb", recursive=True):
              if '.ipynb_checkpoints' in path:
                  continue
              with open(path, 'r', encoding='utf-8') as f:
                  nb = nbformat.read(f, as_version=4)
              modified = False
              for key in ('widgets', 'colab', 'accelerator'):
                  if key in nb.metadata:
                      del nb.metadata[key]; modified = True
              for cell in nb.cells:
                  if cell.cell_type != 'code': continue
                  before = len(cell.get('outputs', []))
                  cell['outputs'] = [
                      o for o in cell.get('outputs', [])
                      if WIDGET_VIEW_MIME  not in o.get('data', {})
                      and WIDGET_STATE_MIME not in o.get('data', {})
                  ]
                  if len(cell['outputs']) != before: modified = True
              if modified:
                  with open(path, 'w', encoding='utf-8') as f:
                      nbformat.write(nb, f)
                  print(f"✓ Safety-net cleaned: {path}")
          EOF

      - name: Convert notebooks to HTML
        run: |
          mkdir -p public
          find . -name "*.ipynb" \
            -not -path "./public/*" \
            -not -path "./.git/*" \
            -not -path "./.ipynb_checkpoints/*" | while read notebook; do
            clean_path="${notebook#./}"
            notebook_dir=$(dirname "$clean_path")
            mkdir -p "public/$notebook_dir"
            echo "Converting: $clean_path"
            jupyter nbconvert --to html \
              --template lab \
              --output-dir="public/$notebook_dir" \
              "$clean_path" \
              && echo "  ✓ OK" \
              || echo "  ⚠️  Failed: $clean_path"
          done

      - name: Build index page
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          LAST_UPDATED=$(date +"%B %d, %Y")
          REPO_TITLE=$(grep -m1 "^# " README.md 2>/dev/null | sed 's/^# //' || echo "$REPO_NAME")

          cat > public/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>${REPO_TITLE}</title>
            <style>
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
                     background: #f6f8fa; color: #24292f; min-height: 100vh; }
              .site-header { background: #fff; border-bottom: 1px solid #d0d7de; padding: 20px 0; }
              .wrap { max-width: 860px; margin: 0 auto; padding: 0 24px; }
              .site-header h1 { font-size: 22px; font-weight: 600; }
              .site-header p  { font-size: 14px; color: #57606a; margin-top: 4px; }
              .content { padding: 32px 0; }
              .section-label {
                font-size: 12px; font-weight: 600; color: #57606a;
                text-transform: uppercase; letter-spacing: .06em;
                margin: 28px 0 10px;
              }
              .nb-card {
                background: #fff; border: 1px solid #d0d7de; border-radius: 6px;
                padding: 14px 18px; margin-bottom: 8px;
                display: flex; align-items: center; gap: 12px;
                transition: border-color .15s, box-shadow .15s;
              }
              .nb-card:hover { border-color: #0969da; box-shadow: 0 1px 4px rgba(9,105,218,.15); }
              .nb-card .icon { font-size: 18px; flex-shrink: 0; }
              .nb-card a { font-size: 15px; font-weight: 500; color: #0969da; text-decoration: none; }
              .nb-card a:hover { text-decoration: underline; }
              .site-footer { border-top: 1px solid #d0d7de; padding: 24px 0; text-align: center;
                             font-size: 13px; color: #57606a; }
              .site-footer a { color: #0969da; text-decoration: none; }
              .site-footer a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <header class="site-header">
              <div class="wrap">
                <h1>${REPO_TITLE}</h1>
                <p>Rendered Jupyter Notebooks · <a href="https://github.com/${GITHUB_REPOSITORY}" target="_blank">View source on GitHub</a></p>
              </div>
            </header>
            <main class="content">
              <div class="wrap" id="notebooks"></div>
            </main>
            <footer class="site-footer">
              <p>Last updated: ${LAST_UPDATED}</p>
            </footer>
            <script>
              const notebooks = [
          HTMLEOF

          find public -name "*.html" -not -name "index.html" | sort | while read html_file; do
            rel="${html_file#public/}"
            raw_name=$(basename "$rel" .html)
            display=$(echo "$raw_name" | tr '_-' '  ' | \
              awk '{for(i=1;i<=NF;i++){$i=toupper(substr($i,1,1)) tolower(substr($i,2))}; print}')
            folder=$(dirname "$rel")
            [ "$folder" = "." ] && folder="Notebooks"
            printf '    { file: "%s", name: "%s", folder: "%s" },\n' \
              "$rel" "$display" "$folder" >> public/index.html
          done

          cat >> public/index.html << 'JSEOF'
              ];

              const grouped = {};
              notebooks.forEach(n => {
                (grouped[n.folder] = grouped[n.folder] || []).push(n);
              });

              const container = document.getElementById('notebooks');
              Object.keys(grouped).sort().forEach(folder => {
                const sec = document.createElement('div');
                const label = document.createElement('div');
                label.className = 'section-label';
                label.textContent = folder.replace(/[_\-]/g, ' ').replace(/\//g, ' / ');
                sec.appendChild(label);
                grouped[folder].sort((a,b) => a.name.localeCompare(b.name)).forEach(nb => {
                  const card = document.createElement('div');
                  card.className = 'nb-card';
                  card.innerHTML = '<span class="icon">📓</span>' +
                    '<a href="' + nb.file + '">' + nb.name + '</a>';
                  sec.appendChild(card);
                });
                container.appendChild(sec);
              });
            </script>
          </body>
          </html>
          JSEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4